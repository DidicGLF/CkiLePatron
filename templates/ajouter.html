{% extends "base.html" %}
{% block title %}Ajouter un patron — CkiLePatron{% endblock %}

{% block content %}
<section class="page-header">
  <div>
    <h1>Ajouter un patron</h1>
  </div>
</section>

<div class="form-container">
  <form method="post" enctype="multipart/form-data" class="formulaire">

    <div class="champ">
      <label for="nom">Nom <span class="requis">*</span></label>
      <input type="text" id="nom" name="nom" placeholder="Ex : CERISE, KAKI…"
             required autofocus />
    </div>

    <div class="champ">
      <label for="description">Description <span class="champ-hint-inline">(texte sous le titre)</span></label>
      <input type="text" id="description" name="description"
             placeholder="la blouse à plis, le pantalon chino…" />
    </div>

    <div class="champ">
      <label for="marque">Marque</label>
      <input type="text" id="marque" name="marque" placeholder="KLAFOUTIS, LA MAISON VICTOR…" />
    </div>

    <div class="champ">
      <label for="marque_url">Site web de la marque</label>
      <input type="url" id="marque_url" name="marque_url" placeholder="https://klafoutis.com" />
    </div>

    <div class="champ">
      <label>Cible <span class="requis">*</span></label>
      <div class="radio-group">
        {% for c in cibles %}
        <label class="radio-pill">
          <input type="radio" name="cible" value="{{ c }}" required />
          <span>{{ c }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="champ">
      <label>Difficulté</label>
      <div class="star-picker" id="diff-picker">
        {% for i in [5, 4, 3, 2, 1] %}
        <input type="radio" name="difficulte" id="da{{ i }}" value="{{ i }}" />
        <label for="da{{ i }}" title="{{ ['','Débutant','Facile','Intermédiaire','Avancé','Expert'][i] }}">✌</label>
        {% endfor %}
        <input type="radio" name="difficulte" id="da0" value="0" checked />
        <label for="da0" class="star-reset" title="Effacer">✕</label>
      </div>
    </div>

    <div class="champ">
      <label for="url">Lien internet du patron</label>
      <input type="url" id="url" name="url" placeholder="https://…" />
    </div>

    <div class="champ">
      <label for="image">Image de couverture</label>
      <div class="upload-zone" id="upload-zone">
        <input type="file" id="image" name="image" accept="image/*" class="upload-input" />
        <div class="upload-inner">
          <span class="upload-icone">🖼</span>
          <p>Glissez une image ici ou <strong>cliquez pour parcourir</strong></p>
          <p class="upload-hint">PNG, JPG, WebP</p>
        </div>
        <div class="upload-preview" id="upload-preview" style="display:none;">
          <img id="preview-img" src="" alt="Aperçu" />
          <button type="button" id="suppr-preview" class="btn btn-sm btn-danger">Retirer</button>
        </div>
      </div>
    </div>

    <div class="champ">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" rows="3"
                placeholder="Tailles, tissu recommandé, remarques…"></textarea>
    </div>

    <div class="form-actions">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">Annuler</a>
      <button type="submit" class="btn btn-primary">Créer le patron</button>
    </div>

  </form>
</div>

<script>
  const input    = document.getElementById('image');
  const zone     = document.getElementById('upload-zone');
  const previewBox = document.getElementById('upload-preview');
  const previewImg = document.getElementById('preview-img');
  const suppBtn  = document.getElementById('suppr-preview');
  const inner    = zone.querySelector('.upload-inner');

  input.addEventListener('change', () => {
    const file = input.files[0];
    if (file) {
      previewImg.src = URL.createObjectURL(file);
      previewBox.style.display = 'flex';
      inner.style.display = 'none';
    }
  });

  suppBtn.addEventListener('click', () => {
    input.value = '';
    previewBox.style.display = 'none';
    inner.style.display = 'flex';
  });
</script>
{% endblock %}
