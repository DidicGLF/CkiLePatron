<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<header>
  <div class="brand-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><circle cx="6" cy="6" r="2.6"/><circle cx="6" cy="18" r="2.6"/><path d="M8 7.5 20 19.5M8 16.5 20 4.5"/><path d="m13.5 11.5 2 1.5"/></svg>
  </div>
  <h1>CkiLe<em>Patron</em></h1>
</header>

<div id="page-erreur" style="display:none">
  <strong>Page non reconnue</strong>
  Ouvrez une page produit sur klafoutis.com pour utiliser cette extension.
</div>

<div id="page-patron" style="display:none">

  <section>
    <div class="field">
      <label>Nom</label>
      <input type="text" id="f-nom">
    </div>
    <div class="field">
      <label>Description</label>
      <input type="text" id="f-description">
    </div>
    <div class="field">
      <label>Marque</label>
      <input type="text" id="f-marque">
    </div>
    <div class="field">
      <label>Cible</label>
      <input type="text" id="f-cible">
    </div>
    <div class="field">
      <label>Difficulté</label>
      <div class="spools" id="spools">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="spool" data-v="1"><rect x="6" y="3.5" width="12" height="2.5" rx="0.5"/><rect x="6" y="18" width="12" height="2.5" rx="0.5"/><path d="M8 6v12M16 6v12"/><path d="M8 8c2 1 6 1 8 0M8 12c2 1 6 1 8 0M8 16c2 1 6 1 8 0"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="spool" data-v="2"><rect x="6" y="3.5" width="12" height="2.5" rx="0.5"/><rect x="6" y="18" width="12" height="2.5" rx="0.5"/><path d="M8 6v12M16 6v12"/><path d="M8 8c2 1 6 1 8 0M8 12c2 1 6 1 8 0M8 16c2 1 6 1 8 0"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="spool" data-v="3"><rect x="6" y="3.5" width="12" height="2.5" rx="0.5"/><rect x="6" y="18" width="12" height="2.5" rx="0.5"/><path d="M8 6v12M16 6v12"/><path d="M8 8c2 1 6 1 8 0M8 12c2 1 6 1 8 0M8 16c2 1 6 1 8 0"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="spool" data-v="4"><rect x="6" y="3.5" width="12" height="2.5" rx="0.5"/><rect x="6" y="18" width="12" height="2.5" rx="0.5"/><path d="M8 6v12M16 6v12"/><path d="M8 8c2 1 6 1 8 0M8 12c2 1 6 1 8 0M8 16c2 1 6 1 8 0"/></svg>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="spool" data-v="5"><rect x="6" y="3.5" width="12" height="2.5" rx="0.5"/><rect x="6" y="18" width="12" height="2.5" rx="0.5"/><path d="M8 6v12M16 6v12"/><path d="M8 8c2 1 6 1 8 0M8 12c2 1 6 1 8 0M8 16c2 1 6 1 8 0"/></svg>
      </div>
    </div>
  </section>

  <section>
    <div class="field">
      <label>Image de couverture</label>
      <div id="apercu"><span>Aucune image sélectionnée</span></div>
      <div class="image-grid" id="image-grid"></div>
    </div>
  </section>

  <footer>
    <button id="btn-ajouter">Ajouter à CkiLePatron</button>
    <div id="status"></div>
  </footer>

</div>

<script src="popup.js"></script>
</body>
</html>
